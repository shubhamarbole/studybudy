databases:
  - name: studybud-db
    databaseName: studybud
    user: studybud

services:
  - type: web
    name: studybud
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT studybud.asgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: studybud-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.10.0
